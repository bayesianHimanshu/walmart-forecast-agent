# SPCS service specification for the Next.js forecasting UI.
# Replace <ORG>-<ACCOUNT> / repository path with your image repository URL from
#   SHOW IMAGE REPOSITORIES IN SCHEMA WALMART_DEMO.FORECAST;
# The public endpoint is fronted by Snowflake's auth proxy: visitors must log in
# to Snowflake (and their default role must not be ACCOUNTADMIN/SECURITYADMIN/ORGADMIN).
spec:
  containers:
    - name: ui
      image: /walmart_demo/forecast/images/forecast-ui:latest
      env:
        SNOWFLAKE_WAREHOUSE: WALMART_WH
        SNOWFLAKE_DATABASE: WALMART_DEMO
        SNOWFLAKE_SCHEMA: FORECAST
        NODE_ENV: production
        PORT: "8080"
      readinessProbe:
        port: 8080
        path: /
  endpoints:
    - name: ui
      port: 8080
      public: true
